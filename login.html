<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud 9 Login</title>
  <link rel="stylesheet" href="login.css" />
  <link rel="icon" href="logo.png" />
</head>
<body>
  <div class="login-card">
    <div class="logo">C9</div>
    <h1>Cloud 9 Login</h1>
    <p class="subtitle">sign in to access your raspberry pi cloud dashboard</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="serverUrl">server url</label>
        <input type="text" id="serverUrl" placeholder="http://192.168.1.44:5000" required />
      </div>

      <div class="form-group">
        <label for="username">username</label>
        <input type="text" id="username" placeholder="enter your username" required />
      </div>

      <div class="form-group">
        <label for="password">password</label>
        <input type="password" id="password" placeholder="enter your password" required />
      </div>

      <div class="options">
        <label class="remember">
          <input type="checkbox" id="rememberMe" />
          remember me
        </label>
        <a href="#">forgot password?</a>
      </div>

      <button type="submit">log in</button>
      <div id="message" class="message"></div>
    </form>

    <div class="footer">
      cloud 9 secure access
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
